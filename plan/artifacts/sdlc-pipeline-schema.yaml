# sdlc-pipeline-schema.yaml — schema for Spine's SDLC pipeline manifest.
# Implements REQ-INIT-1 FR-1/3/5/6/7/8 + INIT-9 EPIC-9.1.
# Pipeline-as-data: NO phase, role, artifact, gate, or tier is hardcoded in source.
# This file describes the SHAPE; sdlc-pipeline-default.yaml is the instance.

$schema: spine.sdlc-pipeline/v1
$kind: schema-definition
$id: sdlc-pipeline-schema-v1

# ── Top-level manifest shape ──────────────────────────────────────────────────
manifest:
  version:        { $type: integer, required: true, monotonic: true }       # FR-8: bump on every edit; projects lock to this
  org_bundle:     { $type: string,  required: true }                        # id of org policy bundle (INIT-2)
  phases:         { $type: array<phase>, required: true, min_items: 1, ordered: true }   # order = execution order; editable (STORY-9.1.4)
  project_types:  { $type: map<project_type_id, project_type>, required: true }          # FR-2 / FR-3
  tier_routing:   { $type: tier_routing, required: true }                   # FR-6
  overrides:      { $type: overrides,    required: false }                  # FR-7 team + project scope-downs
  capabilities:   { $type: map<section_id, capability_requirement>, required: true }     # FR-7 gating
  audit:          { $type: audit,        required: true }                   # FR-8 metadata + edit policy

# ── Sub-shapes ────────────────────────────────────────────────────────────────
phase:
  id:           { $type: string,  required: true, pattern: "^[a-z][a-z0-9_]*$" }
  ownership:    { $type: enum,    required: true, values: [plan, build, verify, orchestrator] }   # ARCHITECTURE §2
  role_lead:    { $type: string,  required: true }                          # role id (product, architect, …)
  role_support: { $type: array<string>, required: false, default: [] }
  swarm:        { $type: swarm,   required: false }                         # only some phases swarm (FR-3)
  artifact:     { $type: enum,    required: true,
                  values: [PRD, TRD, Roadmap, Code, BuildLog, Findings, ReleaseNotes, OpsRunbook, Retro, None] }
  template:     { $type: string,  required: false }                         # e.g. prd-v1, trd-v1
  tier_default: { $type: enum,    required: true, values: [low, medium, high] }
  gate:         { $type: gate,    required: true }

swarm:
  members:          { $type: array<string>, required: true }                # role ids
  composition_rule: { $type: enum, required: true, default: static,
                      values: [static, project_type] }                      # static = use members; project_type = use per-type swarm_override

gate:
  type:          { $type: enum, required: true, values: [user_approval, multi_approver, auto] }
  approvers:     { $type: array<string>, required: true, min_items: 1 }     # role ids or "user"
  min_approvals: { $type: integer, required: true, default: 1 }             # for multi_approver
  on_reject:     { $type: enum, required: false, default: request_changes,
                   values: [terminate, revert, request_changes] }

project_type:
  swarm_override:  { $type: array<string>, required: false }                # used when composition_rule = project_type
  intake_template: { $type: string,        required: true }                 # points to templates/intake/<type>.yaml

tier_routing:
  per_phase_defaults: { $type: map<phase_id, enum>, required: true, values: [low, medium, high] }
  escalation_rules:   { $type: array<escalation_rule>, required: true }     # FR-6 mechanism #2
  budget_caps:        { $type: budget_caps, required: false }               # FR-6 mechanism #3

escalation_rule:
  match:    { $type: enum, values: [synthesis, decision, chitchat, clarification, user_override] }
  set_tier: { $type: enum, values: [low, medium, high] }

budget_caps:
  per_user:    { $type: money, required: false }
  per_project: { $type: money, required: false }
  per_team:    { $type: money, required: false }
  per_org:     { $type: money, required: false }
  enforcement: { $type: enum, values: [hard, soft], default: hard }         # NFR-1: hard by default

overrides:
  team:    { $type: map<team_id, partial<manifest>>, required: false }      # can only edit sections org authorizes
  project: { $type: map<project_id, partial<manifest>>, required: false }   # can only edit sections team authorizes

capability_requirement:
  capability: { $type: string, required: true }                             # e.g. "can_modify_sdlc_pipeline" (FR-7 / STORY-1.7.2)
  scope:      { $type: enum, required: true, values: [org, team, project] } # which override layer can edit this section

audit:
  created_at:         { $type: iso8601_timestamp, required: true }
  last_edited_by:     { $type: string,            required: true }
  last_edited_at:     { $type: iso8601_timestamp, required: true }
  rationale_required: { $type: boolean, required: true, const: true }       # FR-8: NEVER optional
  git_tracked:        { $type: boolean, const: true }
  lock_policy:        { $type: enum, values: [start_of_project, never, manual], default: start_of_project }  # STORY-1.7.5
