# sdlc-pipeline-default.yaml — default SDLC pipeline shipped with Spine.
# Conforms to sdlc-pipeline-schema.yaml v1.
# 11 canonical phases per BACKLOG INIT-9 EPIC-9.1 STORY-9.1.3.
# Ownership maps to Plan / Build / Verify / Orchestrator (ARCHITECTURE §2).
# Orgs override this via team/project layers — they DO NOT fork Spine source.

$schema: spine.sdlc-pipeline/v1
version: 1
org_bundle: spine-default

# ── Canonical phases (ordered) ────────────────────────────────────────────────
phases:
  - id: intake
    ownership: plan
    role_lead: product
    artifact: PRD
    template: prd-v1
    tier_default: medium
    gate: { type: user_approval, approvers: [user], min_approvals: 1, on_reject: request_changes }

  - id: plan_in_progress
    ownership: plan
    role_lead: architect
    role_support: [planner]
    swarm:
      members: [researcher, engineer, datawright, operator, qa]
      composition_rule: project_type
    artifact: TRD
    template: trd-v1
    tier_default: high                                # synthesis-heavy → high
    gate: { type: user_approval, approvers: [user], min_approvals: 1, on_reject: request_changes }

  - id: plan_approved
    ownership: plan
    role_lead: planner
    role_support: [conductor]
    artifact: Roadmap
    template: roadmap-v1
    tier_default: medium
    gate: { type: user_approval, approvers: [user], min_approvals: 1, on_reject: request_changes }

  - id: build_in_progress
    ownership: build
    role_lead: conductor
    role_support: [engineer, datawright, operator]
    artifact: Code
    template: build-log-v1
    tier_default: medium
    gate: { type: auto, approvers: [system], min_approvals: 0 }    # no gate during build

  - id: build_complete
    ownership: build
    role_lead: conductor
    role_support: [engineer]
    artifact: BuildLog
    template: build-log-v1
    tier_default: low
    gate: { type: user_approval, approvers: [user], min_approvals: 1, on_reject: request_changes }

  - id: verify_in_progress
    ownership: verify
    role_lead: qa
    role_support: [operator]
    swarm:
      members: [qa, operator]                         # verify subsystem surfaces ISO agents internally
      composition_rule: project_type
    artifact: Findings
    template: findings-v1                             # legacy alias kept for back-compat
    tier_default: high                                # verification synthesis → high
    gate: { type: auto, approvers: [system], min_approvals: 0 }
    # ── verify-as-a-phase (STORY-8.7.1/8.7.2/8.7.3) ───────────────────
    # Canonical verify phase config. Org bundles patch this section via
    # `verify_overrides:` (bundle-schema.yaml). DO NOT hardcode TRON
    # specifics in source — every knob here is data the orchestrator
    # reads at runtime from the locked pipeline manifest.
    verify_config:
      # MCP tool the orchestrator invokes when entering this phase.
      # Maps 1:1 to router.sh SPINE_MCP_TOOL[verify]; see verify.py.
      mcp_tool: verify_audit                          # STORY-8.7.1
      # Which ISO agents run by default. Bundles widen (regulated) or
      # narrow (lean) this set via verify_overrides.iso_agents_enabled.
      # ComplianceISO + DocumentationISO are opt-in per bundle.
      iso_agents_default:                             # STORY-8.7.2
        - SecurityISO
        - BuilderISO
        - QAISO
        - PerformanceISO
      # TRON's 7 layers — opt-in flags so CI without docker / cost-sensitive
      # orgs can disable expensive layers without forking source.
      layers_enabled:
        deterministic_scanners: true
        schema_validation:      true
        sandbox_execution:      true                  # disable in CI without docker
        cross_llm_validation:   false                 # opt-in via bundle (EPIC-3.7)
        calibration:            true
        prompt_regression:      true
      # Per-verify-run cost cap; overrides tier_routing.budget_caps for
      # this phase only. Bundles raise (regulated) or tighten (lean).
      cost_cap_usd: 5.00
      # Severity floor for auto-remediation routing (STORY-8.7.3 / EPIC-9.8):
      #   critical → fail-fast (blocked, user must intervene)
      #   high     → auto-loop back to build_in_progress via remediation.sh
      #   medium   → advance to verify_approved_with_warnings
      #   low      → advance to verify_approved
      auto_remediation_severity: high
    # Project-type override hook for the findings template. Project types
    # may register a typed findings template (e.g. findings-mobile-v1) by
    # adding `verify_findings_template:` under project_types.<id>.
    template_ref: verify_findings_v1                  # STORY-8.7.1
    next: [verify_approved, build_in_progress]        # build_in_progress = remediation loop
    transitions:
      on_pass:     verify_approved
      on_critical: blocked                            # status update only; no phase
      on_high:     build_in_progress                  # STORY-8.7.3 (EPIC-9.8)
      on_medium:   verify_approved_with_warnings      # advance + flag
      on_low:      verify_approved

  - id: verify_approved
    ownership: verify
    role_lead: qa
    artifact: Findings
    template: findings-v1
    tier_default: low
    gate: { type: multi_approver, approvers: [user, qa], min_approvals: 1, on_reject: request_changes }  # orgs can raise min_approvals (e.g. CTO + Compliance)

  - id: acceptance
    ownership: orchestrator
    role_lead: product
    role_support: [planner]
    artifact: None
    tier_default: low
    gate: { type: user_approval, approvers: [user], min_approvals: 1, on_reject: revert }

  - id: released
    ownership: orchestrator
    role_lead: operator
    artifact: ReleaseNotes
    template: release-notes-v1
    tier_default: low
    gate: { type: auto, approvers: [system], min_approvals: 0 }

  - id: operate
    ownership: orchestrator
    role_lead: operator
    role_support: [qa]
    artifact: OpsRunbook
    template: ops-runbook-v1
    tier_default: low
    gate: { type: auto, approvers: [system], min_approvals: 0 }

  - id: retro
    ownership: orchestrator
    role_lead: planner
    role_support: [product, architect]
    artifact: Retro
    template: retro-v1
    tier_default: medium
    gate: { type: user_approval, approvers: [user], min_approvals: 1, on_reject: terminate }

# ── Project types (FR-2 / FR-3) ───────────────────────────────────────────────
# custom-* types (custom-fintech, custom-healthcare, …) live in org overrides.
# A project_type MAY register `verify_findings_template:` to scope the findings
# template that the verify phase emits — see `templates:` below for the default.
project_types:
  web-app:        { swarm_override: [researcher, engineer, operator, qa],            intake_template: templates/intake/web-app.yaml }
  internal-tool:  { swarm_override: [researcher, engineer, qa],                      intake_template: templates/intake/internal-tool.yaml }
  data-pipeline:  { swarm_override: [researcher, engineer, datawright, operator],    intake_template: templates/intake/data-pipeline.yaml }
  mobile:         { swarm_override: [researcher, engineer, qa, operator],            intake_template: templates/intake/mobile.yaml }
  api-service:    { swarm_override: [researcher, engineer, qa, operator],            intake_template: templates/intake/api-service.yaml }
  cli-tool:       { swarm_override: [researcher, engineer, qa],                      intake_template: templates/intake/cli-tool.yaml }

# ── Templates (project-type-overridable) ──────────────────────────────────────
# Named templates referenced by `phase.template_ref`. Project types or org
# bundles may register typed variants (e.g. verify_findings_mobile_v1) that
# the orchestrator resolves at dispatch time. STORY-8.7.1.
templates:
  verify_findings_v1:
    path: templates/verify/findings_v1.yaml
    schema: shared/mcp/tools/verify.py#VerifyFindings   # Pydantic schema source
    overridable_by: [project_type, org_bundle]

# ── Cost-aware tier routing (FR-6) ────────────────────────────────────────────
tier_routing:
  per_phase_defaults:
    intake: medium
    plan_in_progress: high
    plan_approved: medium
    build_in_progress: medium
    build_complete: low
    verify_in_progress: high
    verify_approved: low
    acceptance: low
    released: low
    operate: low
    retro: medium
  escalation_rules:
    - { match: synthesis,     set_tier: high }
    - { match: decision,      set_tier: high }
    - { match: chitchat,      set_tier: low }
    - { match: clarification, set_tier: low }
    - { match: user_override, set_tier: high }       # power-user pin; logged + counted
  budget_caps:
    per_user: null
    per_project: { amount: 5.00, currency: USD }     # NFR-1: $5 medium-complexity cycle
    per_team: null
    per_org: null
    enforcement: hard

# ── Override hierarchy (FR-7) — empty at default level ────────────────────────
overrides:
  team: {}
  project: {}

# ── Capability map — which capability gates edits to which section (FR-7) ─────
capabilities:
  phases:        { capability: can_modify_sdlc_pipeline, scope: org }
  project_types: { capability: can_modify_sdlc_pipeline, scope: team }
  tier_routing:  { capability: can_modify_cost_policy,   scope: team }
  overrides:     { capability: can_modify_sdlc_pipeline, scope: project }
  audit:         { capability: system_only,              scope: org }

# ── Audit metadata (FR-8) ─────────────────────────────────────────────────────
audit:
  created_at: 2026-05-16T00:00:00Z
  last_edited_by: spine-default
  last_edited_at: 2026-05-16T00:00:00Z
  rationale_required: true                            # NEVER optional (FR-8)
  git_tracked: true
  lock_policy: start_of_project                       # in-flight projects pin to this version (STORY-1.7.5)
