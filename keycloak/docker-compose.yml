# Spine v3 — Keycloak compose (laptop deployment shape, per #17)
#
# Brings up Keycloak + a dedicated Postgres backing store (Keycloak owns its own DB per
# operational best practice; it is intentionally separate from Spine's main `spine_pg`).
#
# Secrets:
#   - NO secrets are committed to the repo.
#   - For local laptop dev, create an untracked `.env.local` (gitignored) with:
#       POSTGRES_PASSWORD=...
#       KEYCLOAK_ADMIN_PASSWORD=...
#     OR rely on init-bootstrap.sh to generate them and write to `.env.local` once.
#   - For BYOC / customer-cloud / on-prem, secrets come from vault via shared/secrets/
#     (Agent D's scope). docker-compose is laptop-only.
#
# Usage:
#   docker compose --env-file .env.local up -d
#   ./init-bootstrap.sh --keycloak-url http://localhost:8080
#
# Cross-agent contract:
#   - Keycloak admin UI:   http://localhost:8080
#   - Keycloak issuer URL: http://localhost:8080/realms/spine
#   - Realm name:          spine
#   - OIDC client_id:      spine-hub
#   shared/identity/keycloak_client.py (Agent C) talks to the issuer URL above.

name: spine-keycloak

services:
  keycloak-db:
    image: postgres:16-alpine
    container_name: spine-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.local}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    networks:
      - spine-keycloak-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    # Keycloak is the only consumer; no external port exposure.
    expose:
      - "5432"

  keycloak:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        KC_VERSION: "26.0.7"
    image: spine/keycloak:v3-dev
    container_name: spine-keycloak
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      # DB wiring
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.local}
      # Day-0 admin bootstrap (init-bootstrap.sh can override or generate).
      # On first-boot only. After realm import these are rotated by init-bootstrap.sh.
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set or generated by init-bootstrap.sh}
      # Hostname / proxy
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      # Health / metrics
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Logging
      KC_LOG_LEVEL: ${KC_LOG_LEVEL:-INFO}
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8080}:8080"
      - "${KEYCLOAK_HTTPS_PORT:-8443}:8443"
      - "${KEYCLOAK_MGMT_PORT:-9000}:9000"
    volumes:
      # Mount realm-config so init-bootstrap.sh can re-import without rebuilding the image.
      - ./realm-config:/opt/keycloak/data/import-templates:ro
      - ./idp-presets:/opt/keycloak/data/idp-presets:ro
    networks:
      - spine-keycloak-net
    command:
      - start
      - --optimized
      - --http-enabled=true
      - --hostname-strict=false

networks:
  spine-keycloak-net:
    name: spine-keycloak-net
    driver: bridge

volumes:
  keycloak-db-data:
    name: spine-keycloak-db-data
