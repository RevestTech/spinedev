# Tron Nginx Configuration — TLS-terminating reverse proxy.
#
# ── Expected cert layout (mounted at /etc/nginx/ssl/ in compose) ─────────────
#
#   /etc/nginx/ssl/cert.pem   — PEM-encoded server certificate chain
#   /etc/nginx/ssl/key.pem    — PEM-encoded private key (chmod 600 on host)
#
# For dev, run ``config/nginx/ssl/generate-dev-cert.sh`` before bringing the
# stack up. For prod, replace with a real cert (Let's Encrypt, internal CA,
# whatever); docs/security/TLS_RUNBOOK.md covers rotation.
#
# ── Ports ───────────────────────────────────────────────────────────────────
#
#   80  — redirects to HTTPS (preserves ``/.well-known/acme-challenge/`` for
#         certbot http-01 renewals)
#   443 — the real listener: TLS 1.2+, HTTP/2, HSTS, CSP, WebSocket upgrade

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time" '
                    'ssl="$ssl_protocol/$ssl_cipher"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    server_tokens off;  # don't leak nginx version in headers/errors

    # ── Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # ── TLS defaults ─────────────────────────────────────────────────────
    #
    # Mozilla "intermediate" profile, minus TLS 1.0/1.1 — which are disabled
    # in all modern browsers anyway. If you must support very old clients,
    # amend this in a named include, not inline, so the change is reviewable.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ── Upstream API ─────────────────────────────────────────────────────
    upstream tron_api {
        ip_hash;  # WebSocket sticky sessions
        server tron-api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ── Rate limits ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ══════════════════════════════════════════════════════════════════════
    #   HTTP :80 — ACME renewal path + hard redirect to HTTPS
    # ══════════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Keep the Let's Encrypt HTTP-01 challenge path reachable over plain
        # HTTP; certbot renewals hit ``/.well-known/acme-challenge/<token>``
        # and the CA validates via HTTP (NOT HTTPS) on port 80.
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            try_files $uri =404;
        }

        # Container-local healthcheck. Docker's HEALTHCHECK curls this path
        # and the resulting redirect would register as a non-2xx → unhealthy.
        # Proxying the API's /health here keeps compose healthchecks working
        # without punching a hole in TLS for real users (the ip_hash upstream
        # is only reachable from inside the docker network anyway).
        location = /health {
            access_log off;
            proxy_pass http://tron_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # Everything else — permanent upgrade to HTTPS. 301 (not 302) so
        # browsers cache the promotion and HSTS builds up.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════
    #   HTTPS :443 — the real listener
    # ══════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        http2 on;
        server_name _;

        # Cert/key paths — these files MUST exist at container start. See
        # the header comment and docs/security/TLS_RUNBOOK.md.
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ── Security headers (TLS vhost only) ────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self'; upgrade-insecure-requests" always;

        # SPA root — frontend/dist is mounted at /usr/share/nginx/html.
        root /usr/share/nginx/html;
        index index.html;

        location = /favicon.ico {
            access_log off;
            alias /usr/share/nginx/html/favicon.svg;
            types { }
            default_type image/svg+xml;
        }

        limit_conn conn_limit 10;

        # ── Liveness probes ──────────────────────────────────────────
        location = /health {
            access_log off;
            proxy_pass http://tron_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        location = /ready {
            access_log off;
            proxy_pass http://tron_api/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # ── API ──────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://tron_api;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # CRITICAL: tell the API that the client spoke HTTPS so Secure
            # cookies flow back and redirects stay on HTTPS.
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_buffering off;
            proxy_request_buffering off;
            proxy_set_header Connection "";
        }

        # ── Socket.IO (upgrade to wss://) ───────────────────────────
        location /socket.io/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://tron_api/socket.io/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            proxy_buffering off;
        }

        # ── Raw FastAPI WebSocket (also wss://) ─────────────────────
        location /ws/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://tron_api/ws/;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            proxy_buffering off;
        }

        # ── SPA routing / static assets ─────────────────────────────
        location / {
            limit_req zone=admin_limit burst=10 nodelay;

            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }

            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            }
        }

        # Block dotfiles from ever leaking.
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Metrics (Prometheus) — internal only ────────────────────
        location /metrics {
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;

            proxy_pass http://tron_api/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── Temporal UI (optional) ──────────────────────────────────
        location /temporal/ {
            proxy_pass http://temporal-ui:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
