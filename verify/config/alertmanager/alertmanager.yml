# Alertmanager configuration for Tron
#
# Receivers post to the Tron API's Alertmanager webhook (tron/api/routes/alerts.py),
# which translates the Alertmanager v4 payload and forwards to Slack. The Slack
# Incoming Webhook URL is resolved at request time from:
#
#   1. TRON_ALERT_SLACK_WEBHOOK env var (dev override)
#   2. keyvault key "alerts/slack-webhook" (production default)
#
# The tron-api service resolves as ``tron-api:8000`` on the default compose
# network. If neither env var nor vault key is configured, the receiver logs a
# warning and returns 200 so Alertmanager does not retry-storm.
#
global:
  resolve_timeout: 5m

route:
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'

  routes:
    - match:
        severity: critical
      receiver: 'critical-receiver'
      repeat_interval: 30m

    - match:
        severity: warning
      receiver: 'warning-receiver'
      repeat_interval: 4h

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://tron-api:8000/alerts'
        send_resolved: true

  - name: 'critical-receiver'
    webhook_configs:
      - url: 'http://tron-api:8000/alerts/critical'
        send_resolved: true

  - name: 'warning-receiver'
    webhook_configs:
      - url: 'http://tron-api:8000/alerts/warning'
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
