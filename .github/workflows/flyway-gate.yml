# Spine v1.0 — Flyway migration gate (fresh DB apply).
#
# Source of truth: docs/V1_SHIP_CHECKLIST.md §1
#   - V1-V36 applies clean on fresh Postgres in CI; rollback drill verified
#   - smoke test runs against the freshly-migrated DB
#
# Triggers: pull_request when any SQL under db/flyway/sql/** changes, or when
# the gate itself is edited. We deliberately do NOT run on every PR — the main
# ci.yml smoke-test already exercises migrations as a side-effect.
#
# Required GitHub Secrets: none (uses an ephemeral Postgres service container).

name: flyway-gate

on:
  pull_request:
    paths:
      - "db/flyway/sql/**"
      - "db/flyway/conf/**"
      - ".github/workflows/flyway-gate.yml"

concurrency:
  group: flyway-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fresh-postgres:
    name: flyway migrate + validate (fresh pgvector pg16)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: spine
          POSTGRES_PASSWORD: spine
          POSTGRES_DB: spine
        ports:
          - 33000:5432
        options: >-
          --health-cmd "pg_isready -U spine -d spine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      FLYWAY_URL: jdbc:postgresql://127.0.0.1:33000/spine
      FLYWAY_USER: spine
      FLYWAY_PASSWORD: spine
      POSTGRES_HOST_PORT: "33000"
      POSTGRES_USER: spine
      POSTGRES_PASSWORD: spine
      POSTGRES_DB: spine
      SPINE_DB_URL: postgresql://spine:spine@127.0.0.1:33000/spine
    steps:
      - uses: actions/checkout@v4

      - name: Install Postgres client + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq

      - name: flyway migrate
        uses: docker://flyway/flyway:10.20.1-alpine
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/spine
            -user=spine
            -password=spine
            -locations=filesystem:db/flyway/sql
            -baselineOnMigrate=true
            -validateMigrationNaming=true
            migrate

      - name: flyway validate (drift detection)
        uses: docker://flyway/flyway:10.20.1-alpine
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/spine
            -user=spine
            -password=spine
            -locations=filesystem:db/flyway/sql
            validate

      - name: flyway info (version history)
        uses: docker://flyway/flyway:10.20.1-alpine
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/spine
            -user=spine
            -password=spine
            -locations=filesystem:db/flyway/sql
            info

      - name: Set up Python (for smoke harness deps)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install yq (smoke harness dep)
        run: |
          sudo curl -sSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: integration smoke (tools/smoke-test.sh against migrated DB)
        run: |
          set -o pipefail
          bash tools/smoke-test.sh | tee smoke.out
          grep -qE "0 +FAIL" smoke.out

      - name: Upload smoke output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flyway-gate-smoke
          path: smoke.out
          retention-days: 14
