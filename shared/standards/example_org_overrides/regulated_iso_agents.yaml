# regulated_iso_agents.yaml — example org bundle excerpt showing how a
# regulated enterprise widens the verify phase ISO-agent set + tightens the
# auto-remediation severity floor. STORY-8.7.2 reference for
# `bundle-schema.yaml § verify_overrides`. See also:
#   - shared/standards/bundle-regulated-enterprise.yaml (full bundle)
#   - plan/artifacts/sdlc-pipeline-default.yaml (verify_config defaults)
#   - orchestrator/lib/verify_dispatcher.sh (consumer)
#   - docs/BACKLOG.md EPIC-8.6 STORY-8.7.2
#
# Drop the verify_overrides: block into any org/team/project bundle to
# require additional ISO agents at the verify phase. Bundle keys win over
# the manifest verify_config via deep-merge; security.iso_agents_required
# is an absolute floor (cannot be removed via iso_agents_disabled).

$schema: spine.org-bundle/v1

identity:
  bundle_version:  1
  bundle_id:       example-regulated-iso-agents
  display_name:    "Example — regulated ISO agents override"
  org_name:        "Reference Org (regulated)"
  inherits_from:   regulated-enterprise-reference   # widens the floor bundle
  scope:           org
  created_at:      2026-05-16T00:00:00Z
  last_updated_at: 2026-05-16T00:00:00Z
  last_updated_by: spine-reference
  rationale:       "STORY-8.7.2 reference: HIPAA + SOC 2 require ComplianceISO and DocumentationISO to fire on every BuildArtifact. Cross-LLM validation is mandatory for high-severity findings (single-provider failure mode is unacceptable under audit). Cost cap lifted from default $5 → $25 because thorough verify on regulated workloads is non-negotiable. auto_remediation_severity tightened from `high` → `critical` so any high finding is escalated to a human reviewer instead of auto-looped."

# ── Verify overrides (STORY-8.7.2) ───────────────────────────────────────
# Bundle keys win over the manifest's verify_config via deep-merge.
verify_overrides:

  # Widen the ISO-agent set. SecurityISO/BuilderISO/QAISO/PerformanceISO
  # come from the manifest default; we add the two compliance agents that
  # HIPAA + SOC 2 + ISO 27001 require.
  iso_agents_enabled:
    - SecurityISO
    - BuilderISO
    - QAISO
    - PerformanceISO
    - ComplianceISO         # REQUIRED for HIPAA / SOC 2 Type II / ISO 27001
    - DocumentationISO      # REQUIRED for audit trail (evidence chain)

  # Enable cross-LLM consensus on high-severity findings; regulated
  # workloads cannot accept single-provider self-confidence.
  layers_enabled:
    cross_llm_validation: true    # EPIC-3.7 multi-LLM consensus
    calibration:          true    # honest confidence reporting

  # Higher per-run cap — regulated verify averages 2-3× tokens vs default
  # because cross-LLM doubles inference cost and ComplianceISO does deep
  # data-flow analysis (taint, lineage, encryption-at-rest checks).
  cost_cap_usd: 25.00

  # Stricter severity floor:
  #   critical → fail-fast (blocked; user must intervene)
  #   high     → escalate to user instead of auto-loop (audit clarity)
  auto_remediation_severity: critical

  # Blueprint scope — TRON receives extra check_types for regulated work
  # and explicitly out-of-scopes performance (not a regulated concern).
  blueprint_overrides:
    check_types:
      - security
      - compliance
      - data_protection
      - audit_trail
    not_in_scope:
      - performance         # tracked separately; not a regulated concern
    require_sbom:                true
    require_taint_analysis:      true
    require_provenance_record:   true
