<!DOCTYPE html>
<!--
  Spine Hub SPA — base shell (V3 Wave 3 part 2, Squad SPA1).

  Per design decision #28 (mobile-responsive Day 1) the viewport meta is
  width=device-width + initial-scale=1 + maximum-scale=5 so panels remain
  zoomable for accessibility on iPhone Safari / Android Chrome.

  No external CDNs (per #18 closed-source posture: every asset ships in the
  Hub container). The Inter font is bundled via Tailwind's font stack and
  falls back to system-ui when not preloaded.
-->
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover"
    />
    <meta name="theme-color" content="#18181b" />
    <meta name="description" content="Spine Hub — managed AI org control plane." />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    %sveltekit.head%
  </head>
  <body
    data-sveltekit-preload-data="hover"
    class="min-h-full bg-surface-50 text-surface-900 antialiased dark:bg-surface-900 dark:text-surface-50"
  >
    <div id="svelte" class="contents">%sveltekit.body%</div>
  </body>
</html>
