# Markdown extractor — DEPRECATED IN FAVOR OF build/kg/doc_parser/
#
# Wave 1 (v3) decision: there are two implementations of the same job
# in the tree —
#
#   1. THIS YAML — a tree-sitter declarative extractor config that
#      handles heading nodes + LINKS_TO + CITES via inline regex.
#   2. build/kg/doc_parser/ — a richer Python implementation that
#      handles all of the above PLUS doc-subtype-specific child nodes:
#      REQ / PRD / TRD / ADR / Initiative / Epic / Story / Role /
#      MemoryLesson / Release. Plus the spine_id_resolver runs a
#      typed lookup that promotes external IDs to real KG node IDs
#      after subsequent indexing passes.
#
# The two overlap (both emit Heading + LINKS_TO + CITES), but only
# doc_parser/ produces the typed Requirement / Story / ADR / role
# subgraph that REQ-INIT-6 FR-4 actually asks for.
#
# Resolution (Wave 1, v3 — Squad B):
#   * doc_parser/ is the source of truth for .md files. The indexer
#     should route .md through doc_parser/markdown_parser.parse_markdown
#     (and the per-subtype wrappers in spine_doc_parser.py) — not
#     through the tree-sitter pipeline.
#   * THIS file is reduced to documentation. It MUST NOT be loaded by
#     the parser runtime; the indexer's file_filters logic should
#     exclude .md files from tree-sitter extraction (see
#     build/kg/extractors/README.md table).
#   * The schema fragment retained below is intentionally empty
#     (no node_extractors, no edge_extractors) so any indexer that
#     accidentally enumerates this file extracts nothing — guarding
#     against double-counting headings/edges if doc_parser/ also
#     fires for the same file.
#
# Migration tracking: this consolidation closes the duplication entry
# in docs/V3_BUILD_SEQUENCE.md Wave-1 quiet-bug list (#7).

language: markdown

grammar:
  package: tree_sitter_markdown
  version: "0.3.*"
  language_function: language

# DELIBERATELY EMPTY — see header. doc_parser/markdown_parser.py owns
# Heading + LINKS_TO + CITES emission for .md files; this YAML must NOT
# produce duplicates.
node_extractors: []
edge_extractors: []

file_filters:
  # Exclude every .md file from tree-sitter routing. The indexer routes
  # .md to build/kg/doc_parser/ instead (see doc_parser_README.md).
  include_globs: []
  exclude_globs: ["**/*.md", "**/*.markdown"]

test_file_detection: { path_patterns: [], name_patterns: [] }
