# Tron Nginx Configuration - Version 2.1 (Fixed)
# Addresses Admin UI environment variable and WebSocket issues

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;  # Allow large file uploads

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # HSTS (uncomment when TLS is configured)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy for Admin UI
    # No unsafe-inline or unsafe-eval — use nonce-based CSP if inline scripts are needed
    # Tailwind/Vite may inject inline styles in dev builds; 'unsafe-inline' keeps SPA working behind nginx.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' ws: wss:; frame-ancestors 'self';" always;

    # Upstream API servers (for load balancing)
    upstream tron_api {
        # Use ip_hash for WebSocket sticky sessions
        ip_hash;
        
        # Add multiple API instances for scaling
        server tron-api:8000 max_fails=3 fail_timeout=30s;
        # Uncomment when scaling:
        # server tron-api-2:8000 max_fails=3 fail_timeout=30s;
        # server tron-api-3:8000 max_fails=3 fail_timeout=30s;
        
        keepalive 32;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Main server block
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;  # Replace with your domain

        # TLS/HTTPS Configuration (uncomment and configure)
        # listen 443 ssl http2;
        # listen [::]:443 ssl http2;
        # ssl_certificate /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;
        # ssl_prefer_server_ciphers on;
        # ssl_session_cache shared:SSL:10m;
        # ssl_session_timeout 10m;

        # Primary SPA — mount `frontend/dist` here (`make prod-static` or `npm run build`).
        root /usr/share/nginx/html;
        index index.html;

        # Many clients (and browser extensions) still request /favicon.ico; the Vite app only ships favicon.svg.
        location = /favicon.ico {
            access_log off;
            alias /usr/share/nginx/html/favicon.svg;
            types { }
            default_type image/svg+xml;
        }

        # Connection limits
        limit_conn conn_limit 10;

        # Liveness — proxied to API (same path as direct uvicorn).
        location = /health {
            access_log off;
            proxy_pass http://tron_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        location = /ready {
            access_log off;
            proxy_pass http://tron_api/ready;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }

        # API endpoints (reverse proxy to FastAPI)
        location /api/ {
            # Rate limiting
            limit_req zone=api_limit burst=20 nodelay;

            # Preserve `/api/...` — `proxy_pass .../` would strip the prefix and break FastAPI mounts.
            proxy_pass http://tron_api;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering (disable for streaming responses)
            proxy_buffering off;
            proxy_request_buffering off;
            
            # Keep-alive
            proxy_set_header Connection "";
        }

        # WebSocket endpoint (Socket.IO)
        # FIXED: Proper WebSocket configuration with sticky sessions
        location /socket.io/ {
            # Rate limiting (more permissive for WebSocket)
            limit_req zone=api_limit burst=50 nodelay;

            # Proxy to API backend
            proxy_pass http://tron_api/socket.io/;
            proxy_http_version 1.1;
            
            # WebSocket upgrade headers (CRITICAL)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts (keep connections alive)
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            
            # Disable buffering for WebSocket
            proxy_buffering off;
            
            # Keep-alive
            proxy_set_header Connection "upgrade";
        }

        # Alternative WebSocket path (if using raw FastAPI WebSocket)
        location /ws/ {
            limit_req zone=api_limit burst=50 nodelay;
            
            proxy_pass http://tron_api/ws/;
            proxy_http_version 1.1;
            
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
            proxy_buffering off;
        }

        # Primary SPA — same-origin `/api` and `/socket.io` (legacy admin-ui: dev server or custom mount).
        location / {
            # Rate limiting for admin UI
            limit_req zone=admin_limit burst=10 nodelay;

            # Try files first, fall back to index.html for SPA routing
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
            
            # Don't cache index.html (for app updates)
            location = /index.html {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
            }
        }

        # Deny access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # Metrics endpoint (Prometheus scraping)
        location /metrics {
            allow 127.0.0.1;
            allow 172.0.0.0/8;  # Docker networks
            deny all;
            
            proxy_pass http://tron_api/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Temporal UI (optional proxy)
        location /temporal/ {
            proxy_pass http://temporal-ui:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # Redirect HTTP to HTTPS (uncomment when TLS is configured)
    # server {
    #     listen 80;
    #     listen [::]:80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }
}

# ==============================================================================
# CONFIGURATION NOTES
# ==============================================================================
#
# 1. Same-Origin Fix:
#    - Admin UI served from / (e.g., http://localhost/)
#    - API served from /api/ (e.g., http://localhost/api/)
#    - WebSocket from /socket.io/ (e.g., ws://localhost/socket.io/)
#    - This solves VITE_API_URL problem - frontend uses relative URLs
#
# 2. WebSocket Sticky Sessions:
#    - ip_hash in upstream ensures same client → same backend
#    - Critical for Socket.IO rooms and state
#
# 3. Load Balancing:
#    - Add more "server" lines in upstream block to scale API
#    - Nginx will distribute load automatically
#
# 4. Security:
#    - Rate limiting prevents abuse
#    - Security headers protect against XSS, clickjacking
#    - CSP restricts script sources
#    - HSTS enforces HTTPS (when enabled)
#
# 5. Performance:
#    - Gzip compression for text assets
#    - Static file caching for 1 year
#    - Keep-alive connections to backend
#
# 6. Monitoring:
#    - Access logs include timing information
#    - /metrics endpoint for Prometheus
#    - /health endpoint for load balancers
#
